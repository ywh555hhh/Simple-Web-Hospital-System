<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>开具处方 - 校医院医务收费管理系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        .page-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 0;
            margin-bottom: 30px;
        }
        .content-card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }
        .patient-card {
            border: 2px solid #e1e5e9;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 15px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .patient-card:hover {
            border-color: #667eea;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .patient-card.selected {
            border-color: #667eea;
            background-color: #f8f9ff;
        }
        .drug-item {
            border: 1px solid #e1e5e9;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 10px;
            background: #f8f9fa;
        }
        .drug-search {
            position: relative;
        }
        .drug-dropdown {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            border: 1px solid #ddd;
            border-radius: 8px;
            max-height: 200px;
            overflow-y: auto;
            z-index: 1000;
            display: none;
        }
        .drug-option {
            padding: 10px 15px;
            cursor: pointer;
            border-bottom: 1px solid #eee;
        }
        .drug-option:hover {
            background-color: #f8f9fa;
        }
        .drug-option:last-child {
            border-bottom: none;
        }
        .prescription-summary {
            background: linear-gradient(135deg, #56ab2f 0%, #a8e6cf 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
        }
        .btn-custom {
            border-radius: 10px;
            padding: 12px 24px;
            font-weight: bold;
        }
        .status-badge {
            font-size: 0.9em;
            padding: 5px 10px;
        }
    </style>
</head>
<body>
    <!-- 页面头部 -->
    <div class="page-header">
        <div class="container">
            <div class="row align-items-center">
                <div class="col">
                    <h1><i class="bi bi-file-medical"></i> 开具处方</h1>
                    <p class="mb-0">为患者开具电子处方</p>
                </div>
                <div class="col-auto">
                    <a href="index.html" class="btn btn-light">
                        <i class="bi bi-house"></i> 返回主页
                    </a>
                </div>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="row">
            <!-- 左侧：待诊患者列表 -->
            <div class="col-md-4">
                <div class="content-card">
                    <h4 class="mb-4"><i class="bi bi-people"></i> 待诊患者</h4>
                    <div id="patientsContainer">
                        <div class="text-center text-muted">
                            <div class="spinner-border" role="status"></div>
                            <p class="mt-2">加载中...</p>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- 右侧：处方开具 -->
            <div class="col-md-8">
                <div class="content-card">
                    <h4 class="mb-4"><i class="bi bi-prescription2"></i> 处方信息</h4>
                    
                    <div id="alertContainer"></div>
                    
                    <div id="prescriptionSection" style="display: none;">
                        <!-- 患者信息 -->
                        <div class="alert alert-info">
                            <strong>患者：</strong><span id="selectedPatientName"></span> | 
                            <strong>科室：</strong><span id="selectedDepartment"></span> | 
                            <strong>挂号费：</strong>¥<span id="selectedFee"></span>
                        </div>
                        
                        <!-- 药品搜索和添加 -->
                        <div class="mb-4">
                            <label class="form-label">添加药品</label>
                            <div class="drug-search">
                                <input type="text" class="form-control" id="drugSearch" placeholder="搜索药品名称...">
                                <div class="drug-dropdown" id="drugDropdown"></div>
                            </div>
                        </div>
                        
                        <!-- 已选药品列表 -->
                        <div class="mb-4">
                            <label class="form-label">处方药品</label>
                            <div id="selectedDrugs">
                                <div class="text-muted">暂未添加药品</div>
                            </div>
                        </div>
                        
                        <!-- 处方汇总 -->
                        <div class="prescription-summary">
                            <h5>处方汇总</h5>
                            <div class="row">
                                <div class="col-md-6">
                                    <p class="mb-1">药品总计：<span id="totalItems">0</span> 项</p>
                                    <p class="mb-0">药品金额：¥<span id="totalAmount">0.00</span></p>
                                </div>
                                <div class="col-md-6 text-end">
                                    <button type="button" class="btn btn-light btn-custom" onclick="clearPrescription()">
                                        <i class="bi bi-arrow-clockwise"></i> 重置
                                    </button>
                                    <button type="button" class="btn btn-success btn-custom" id="submitPrescription">
                                        <span class="spinner-border spinner-border-sm d-none" role="status"></span>
                                        <i class="bi bi-check-circle"></i> 提交处方
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div id="noPatientSelected" class="text-center text-muted py-5">
                        <i class="bi bi-person-check" style="font-size: 3rem; opacity: 0.3;"></i>
                        <p class="mt-3">请先选择要诊治的患者</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        let selectedPatient = null;
        let selectedDrugs = [];
        let allDrugs = [];
        
        // 显示提示信息
        function showAlert(message, type = 'danger') {
            const alertHtml = `
                <div class="alert alert-${type} alert-dismissible fade show" role="alert">
                    ${message}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            `;
            $('#alertContainer').html(alertHtml);
            
            setTimeout(() => {
                $('.alert').alert('close');
            }, 5000);
        }
        
        // 检查权限
        function checkPermission() {
            $.ajax({
                url: '/api/current_user',
                method: 'GET',
                success: function(response) {
                    if (!response.success || response.user.role !== 'doctor') {
                        alert('您没有权限访问此页面');
                        window.location.href = '/index.html';
                    }
                },
                error: function() {
                    window.location.href = '/login.html';
                }
            });
        }
        
        // 加载待诊患者
        function loadPatients() {
            $.ajax({
                url: '/api/my_patients',
                method: 'GET',
                success: function(response) {
                    if (response.success) {
                        displayPatients(response.data);
                    } else {
                        $('#patientsContainer').html('<div class="text-danger">加载失败</div>');
                    }
                },
                error: function() {
                    $('#patientsContainer').html('<div class="text-danger">加载失败</div>');
                }
            });
        }
        
        // 显示患者列表
        function displayPatients(patients) {
            if (patients.length === 0) {
                $('#patientsContainer').html('<div class="text-muted">暂无待诊患者</div>');
                return;
            }
            
            let html = '';
            patients.forEach(patient => {
                const statusClass = patient.status === 'waiting' ? 'warning' : 'info';
                const statusText = patient.status === 'waiting' ? '待就诊' : '已就诊';
                
                html += `
                    <div class="patient-card" data-patient='${JSON.stringify(patient)}'>
                        <div class="d-flex justify-content-between align-items-start">
                            <div>
                                <h6 class="mb-1">${patient.patient_name}</h6>
                                <small class="text-muted">${patient.department_name}</small>
                                <br>
                                <small class="text-muted">挂号费：¥${patient.fee}</small>
                            </div>
                            <span class="badge bg-${statusClass} status-badge">${statusText}</span>
                        </div>
                        <small class="text-muted">${new Date(patient.created_at).toLocaleString()}</small>
                    </div>
                `;
            });
            
            $('#patientsContainer').html(html);
            
            // 绑定患者选择事件
            $('.patient-card').on('click', function() {
                $('.patient-card').removeClass('selected');
                $(this).addClass('selected');
                
                selectedPatient = $(this).data('patient');
                showPrescriptionSection();
            });
        }
        
        // 显示处方开具区域
        function showPrescriptionSection() {
            $('#noPatientSelected').hide();
            $('#prescriptionSection').show();
            
            // 填充患者信息
            $('#selectedPatientName').text(selectedPatient.patient_name);
            $('#selectedDepartment').text(selectedPatient.department_name);
            $('#selectedFee').text(selectedPatient.fee);
            
            // 清空之前的处方
            clearPrescription();
        }
        
        // 加载所有药品（用于搜索）
        function loadDrugs() {
            $.ajax({
                url: '/api/drugs',
                method: 'GET',
                success: function(response) {
                    if (response.success) {
                        allDrugs = response.data;
                    }
                },
                error: function() {
                    console.error('加载药品列表失败');
                }
            });
        }
        
        // 药品搜索
        $('#drugSearch').on('input', function() {
            const query = $(this).val().toLowerCase();
            if (query.length < 1) {
                $('#drugDropdown').hide();
                return;
            }
            
            const filtered = allDrugs.filter(drug => 
                drug.name.toLowerCase().includes(query)
            );
            
            if (filtered.length > 0) {
                let html = '';
                filtered.forEach(drug => {
                    html += `
                        <div class="drug-option" data-drug='${JSON.stringify(drug)}'>
                            <strong>${drug.name}</strong>
                            <br>
                            <small class="text-muted">售价：¥${drug.sale_price} | 库存：${drug.stock}</small>
                        </div>
                    `;
                });
                
                $('#drugDropdown').html(html).show();
                
                // 绑定药品选择事件
                $('.drug-option').on('click', function() {
                    const drug = $(this).data('drug');
                    addDrugToPrescription(drug);
                    $('#drugSearch').val('');
                    $('#drugDropdown').hide();
                });
            } else {
                $('#drugDropdown').hide();
            }
        });
        
        // 点击其他地方隐藏下拉框
        $(document).on('click', function(e) {
            if (!$(e.target).closest('.drug-search').length) {
                $('#drugDropdown').hide();
            }
        });
        
        // 添加药品到处方
        function addDrugToPrescription(drug) {
            // 检查是否已添加
            const existingIndex = selectedDrugs.findIndex(item => item.drug_id === drug.id);
            if (existingIndex !== -1) {
                selectedDrugs[existingIndex].quantity += 1;
            } else {
                selectedDrugs.push({
                    drug_id: drug.id,
                    name: drug.name,
                    sale_price: drug.sale_price,
                    quantity: 1,
                    stock: drug.stock
                });
            }
            
            updatePrescriptionDisplay();
        }
        
        // 更新处方显示
        function updatePrescriptionDisplay() {
            if (selectedDrugs.length === 0) {
                $('#selectedDrugs').html('<div class="text-muted">暂未添加药品</div>');
                $('#totalItems').text('0');
                $('#totalAmount').text('0.00');
                return;
            }
            
            let html = '';
            let totalAmount = 0;
            
            selectedDrugs.forEach((item, index) => {
                const subtotal = item.sale_price * item.quantity;
                totalAmount += subtotal;
                
                html += `
                    <div class="drug-item">
                        <div class="row align-items-center">
                            <div class="col">
                                <strong>${item.name}</strong>
                                <br>
                                <small class="text-muted">单价：¥${item.sale_price} | 库存：${item.stock}</small>
                            </div>
                            <div class="col-auto">
                                <div class="input-group input-group-sm" style="width: 120px;">
                                    <button class="btn btn-outline-secondary" type="button" onclick="updateQuantity(${index}, -1)">-</button>
                                    <input type="number" class="form-control text-center" value="${item.quantity}" min="1" onchange="setQuantity(${index}, this.value)">
                                    <button class="btn btn-outline-secondary" type="button" onclick="updateQuantity(${index}, 1)">+</button>
                                </div>
                            </div>
                            <div class="col-auto">
                                <strong>¥${subtotal.toFixed(2)}</strong>
                            </div>
                            <div class="col-auto">
                                <button type="button" class="btn btn-sm btn-outline-danger" onclick="removeDrug(${index})">
                                    <i class="bi bi-trash"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            });
            
            $('#selectedDrugs').html(html);
            $('#totalItems').text(selectedDrugs.length);
            $('#totalAmount').text(totalAmount.toFixed(2));
        }
        
        // 更新药品数量
        function updateQuantity(index, change) {
            const newQuantity = selectedDrugs[index].quantity + change;
            if (newQuantity >= 1) {
                selectedDrugs[index].quantity = newQuantity;
                updatePrescriptionDisplay();
            }
        }
        
        // 设置药品数量
        function setQuantity(index, value) {
            const quantity = parseInt(value);
            if (quantity >= 1) {
                selectedDrugs[index].quantity = quantity;
                updatePrescriptionDisplay();
            }
        }
        
        // 移除药品
        function removeDrug(index) {
            selectedDrugs.splice(index, 1);
            updatePrescriptionDisplay();
        }
        
        // 清空处方
        function clearPrescription() {
            selectedDrugs = [];
            updatePrescriptionDisplay();
        }
        
        // 提交处方
        $('#submitPrescription').on('click', function() {
            if (!selectedPatient) {
                showAlert('请先选择患者');
                return;
            }
            
            if (selectedDrugs.length === 0) {
                showAlert('请添加药品');
                return;
            }
            
            // 检查库存
            for (let item of selectedDrugs) {
                if (item.quantity > item.stock) {
                    showAlert(`${item.name} 库存不足，当前库存：${item.stock}`);
                    return;
                }
            }
            
            const $btn = $(this);
            const $spinner = $btn.find('.spinner-border');
            $btn.prop('disabled', true);
            $spinner.removeClass('d-none');
            
            const prescriptionData = {
                registration_id: selectedPatient.id,
                drugs: selectedDrugs.map(item => ({
                    drug_id: item.drug_id,
                    quantity: item.quantity
                }))
            };
            
            $.ajax({
                url: '/api/prescriptions',
                method: 'POST',
                contentType: 'application/json',
                data: JSON.stringify(prescriptionData),
                success: function(response) {
                    if (response.success) {
                        showAlert('处方开具成功！', 'success');
                        clearPrescription();
                        loadPatients(); // 重新加载患者列表
                        $('#prescriptionSection').hide();
                        $('#noPatientSelected').show();
                        selectedPatient = null;
                    } else {
                        showAlert(response.message || '处方开具失败');
                    }
                },
                error: function(xhr) {
                    let message = '处方开具失败，请稍后重试';
                    if (xhr.responseJSON && xhr.responseJSON.message) {
                        message = xhr.responseJSON.message;
                    }
                    showAlert(message);
                },
                complete: function() {
                    $btn.prop('disabled', false);
                    $spinner.addClass('d-none');
                }
            });
        });
        
        // 页面初始化
        $(document).ready(function() {
            checkPermission();
            loadPatients();
            loadDrugs();
        });
    </script>
</body>
</html>
