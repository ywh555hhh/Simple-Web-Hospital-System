<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>病人挂号 - 校医院医务收费管理系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        .page-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 0;
            margin-bottom: 30px;
        }
        .registration-card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }
        .form-control, .form-select {
            border-radius: 10px;
            padding: 12px 15px;
            border: 2px solid #e1e5e9;
        }
        .form-control:focus, .form-select:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
        }
        .btn-custom {
            border-radius: 10px;
            padding: 12px 24px;
            font-weight: bold;
        }
        .doctor-card {
            border: 2px solid #e1e5e9;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .doctor-card:hover {
            border-color: #667eea;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .doctor-card.selected {
            border-color: #667eea;
            background-color: #f8f9ff;
        }
        .fee-display {
            background: linear-gradient(135deg, #56ab2f 0%, #a8e6cf 100%);
            color: white;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            margin: 20px 0;
        }
        .fee-display h4 {
            margin: 0;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <!-- 页面头部 -->
    <div class="page-header">
        <div class="container">
            <div class="row align-items-center">
                <div class="col">
                    <h1><i class="bi bi-person-plus"></i> 病人挂号</h1>
                    <p class="mb-0">为患者办理挂号手续</p>
                </div>
                <div class="col-auto">
                    <a href="index.html" class="btn btn-light">
                        <i class="bi bi-house"></i> 返回主页
                    </a>
                </div>
            </div>
        </div>
    </div>

    <div class="container">
        <!-- 挂号表单 -->
        <div class="registration-card">
            <h3 class="mb-4"><i class="bi bi-clipboard-plus"></i> 新增挂号</h3>
            
            <div id="alertContainer"></div>
            
            <form id="registrationForm">
                <div class="row">
                    <div class="col-md-6">
                        <div class="mb-3">
                            <label for="patientName" class="form-label">患者姓名</label>
                            <input type="text" class="form-control" id="patientName" name="patientName" required>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="mb-3">
                            <label for="department" class="form-label">就诊科室</label>
                            <select class="form-select" id="department" name="department" required>
                                <option value="">请选择科室</option>
                            </select>
                        </div>
                    </div>
                </div>
                
                <!-- 医生选择区域 -->
                <div class="mb-3">
                    <label class="form-label">选择医生</label>
                    <div id="doctorsContainer">
                        <div class="text-muted">请先选择科室</div>
                    </div>
                </div>
                
                <!-- 费用显示 -->
                <div class="fee-display">
                    <h4>挂号费：¥<span id="feeAmount">15.00</span></h4>
                </div>
                
                <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                    <button type="button" class="btn btn-secondary btn-custom" onclick="clearForm()">
                        <i class="bi bi-arrow-clockwise"></i> 重置
                    </button>
                    <button type="submit" class="btn btn-primary btn-custom" id="submitBtn">
                        <span class="spinner-border spinner-border-sm d-none" role="status"></span>
                        <i class="bi bi-check-circle"></i> 确认挂号
                    </button>
                </div>
            </form>
        </div>
        
        <!-- 最近挂号记录 -->
        <div class="registration-card">
            <h3 class="mb-4"><i class="bi bi-clock-history"></i> 最近挂号记录</h3>
            <div class="table-responsive">
                <table class="table table-hover">
                    <thead class="table-light">
                        <tr>
                            <th>患者姓名</th>
                            <th>科室</th>
                            <th>医生</th>
                            <th>挂号费</th>
                            <th>状态</th>
                            <th>挂号时间</th>
                        </tr>
                    </thead>
                    <tbody id="recentRegistrations">
                        <tr>
                            <td colspan="6" class="text-center text-muted">暂无数据</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        let selectedDoctorId = null;
        let selectedDepartmentId = null;
        
        // 显示提示信息
        function showAlert(message, type = 'danger') {
            const alertHtml = `
                <div class="alert alert-${type} alert-dismissible fade show" role="alert">
                    ${message}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            `;
            $('#alertContainer').html(alertHtml);
            
            // 自动滚动到顶部
            $('html, body').animate({scrollTop: 0}, 500);
            
            // 5秒后自动隐藏
            setTimeout(() => {
                $('.alert').alert('close');
            }, 5000);
        }
        
        // 检查权限
        function checkPermission() {
            $.ajax({
                url: '/api/current_user',
                method: 'GET',
                success: function(response) {
                    if (!response.success || response.user.role !== 'registration') {
                        alert('您没有权限访问此页面');
                        window.location.href = '/index.html';
                    }
                },
                error: function() {
                    window.location.href = '/login.html';
                }
            });
        }
        
        // 加载科室列表
        function loadDepartments() {
            $.ajax({
                url: '/api/departments',
                method: 'GET',
                success: function(response) {
                    if (response.success) {
                        let options = '<option value="">请选择科室</option>';
                        response.data.forEach(dept => {
                            options += `<option value="${dept.id}">${dept.name}</option>`;
                        });
                        $('#department').html(options);
                    }
                },
                error: function() {
                    showAlert('加载科室列表失败');
                }
            });
        }
        
        // 科室选择变化时加载医生
        $('#department').on('change', function() {
            const deptId = $(this).val();
            selectedDepartmentId = deptId;
            selectedDoctorId = null;
            
            if (deptId) {
                loadDoctors(deptId);
            } else {
                $('#doctorsContainer').html('<div class="text-muted">请先选择科室</div>');
            }
        });
        
        // 加载指定科室的医生
        function loadDoctors(deptId) {
            $('#doctorsContainer').html('<div class="text-muted">加载中...</div>');
            
            $.ajax({
                url: `/api/doctors_by_dept/${deptId}`,
                method: 'GET',
                success: function(response) {
                    if (response.success && response.data.length > 0) {
                        let doctorsHtml = '';
                        response.data.forEach(doctor => {
                            doctorsHtml += `
                                <div class="doctor-card" data-doctor-id="${doctor.id}">
                                    <div class="row align-items-center">
                                        <div class="col">
                                            <h5 class="mb-1">${doctor.full_name}</h5>
                                            <small class="text-muted">${doctor.department_name}</small>
                                        </div>
                                        <div class="col-auto">
                                            <span class="badge bg-success">在线</span>
                                        </div>
                                    </div>
                                </div>
                            `;
                        });
                        $('#doctorsContainer').html(doctorsHtml);
                        
                        // 绑定医生选择事件
                        $('.doctor-card').on('click', function() {
                            $('.doctor-card').removeClass('selected');
                            $(this).addClass('selected');
                            selectedDoctorId = $(this).data('doctor-id');
                        });
                    } else {
                        $('#doctorsContainer').html('<div class="text-muted">该科室暂无可用医生</div>');
                    }
                },
                error: function() {
                    $('#doctorsContainer').html('<div class="text-danger">加载医生列表失败</div>');
                }
            });
        }
        
        // 清空表单
        function clearForm() {
            $('#registrationForm')[0].reset();
            selectedDoctorId = null;
            selectedDepartmentId = null;
            $('.doctor-card').removeClass('selected');
            $('#doctorsContainer').html('<div class="text-muted">请先选择科室</div>');
        }
        
        // 提交挂号表单
        $('#registrationForm').on('submit', function(e) {
            e.preventDefault();
            
            const patientName = $('#patientName').val().trim();
            
            if (!patientName) {
                showAlert('请输入患者姓名');
                return;
            }
            
            if (!selectedDepartmentId) {
                showAlert('请选择就诊科室');
                return;
            }
            
            if (!selectedDoctorId) {
                showAlert('请选择医生');
                return;
            }
            
            // 显示加载状态
            const $btn = $('#submitBtn');
            const $spinner = $btn.find('.spinner-border');
            $btn.prop('disabled', true);
            $spinner.removeClass('d-none');
            
            // 提交挂号
            $.ajax({
                url: '/api/registrations',
                method: 'POST',
                contentType: 'application/json',
                data: JSON.stringify({
                    patient_name: patientName,
                    department_id: parseInt(selectedDepartmentId),
                    doctor_id: parseInt(selectedDoctorId),
                    fee: 15.0
                }),
                success: function(response) {
                    if (response.success) {
                        showAlert('挂号成功！', 'success');
                        clearForm();
                        loadRecentRegistrations();
                    } else {
                        showAlert(response.message || '挂号失败');
                    }
                },
                error: function(xhr) {
                    let message = '挂号失败，请稍后重试';
                    if (xhr.responseJSON && xhr.responseJSON.message) {
                        message = xhr.responseJSON.message;
                    }
                    showAlert(message);
                },
                complete: function() {
                    $btn.prop('disabled', false);
                    $spinner.addClass('d-none');
                }
            });
        });
        
        // 加载最近挂号记录
        function loadRecentRegistrations() {
            // 这里暂时使用模拟数据，实际应该从API获取
            const mockData = [
                {
                    patient_name: '张三',
                    department: '内科',
                    doctor: '李医生',
                    fee: 15.0,
                    status: 'waiting',
                    created_at: new Date().toLocaleString()
                }
            ];
            
            if (mockData.length === 0) {
                $('#recentRegistrations').html(`
                    <tr><td colspan="6" class="text-center text-muted">暂无数据</td></tr>
                `);
                return;
            }
            
            let html = '';
            mockData.forEach(record => {
                const statusBadge = record.status === 'waiting' ? 
                    '<span class="badge bg-warning">待就诊</span>' :
                    record.status === 'finished' ? 
                    '<span class="badge bg-info">已就诊</span>' :
                    '<span class="badge bg-success">已缴费</span>';
                
                html += `
                    <tr>
                        <td>${record.patient_name}</td>
                        <td>${record.department}</td>
                        <td>${record.doctor}</td>
                        <td>¥${record.fee.toFixed(2)}</td>
                        <td>${statusBadge}</td>
                        <td>${record.created_at}</td>
                    </tr>
                `;
            });
            
            $('#recentRegistrations').html(html);
        }
        
        // 页面初始化
        $(document).ready(function() {
            checkPermission();
            loadDepartments();
            loadRecentRegistrations();
        });
    </script>
</body>
</html>
