<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>校医院医务收费管理系统 - 登录</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            padding: 40px;
            width: 100%;
            max-width: 400px;
        }
        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .login-header h2 {
            color: #333;
            font-weight: bold;
        }
        .login-header p {
            color: #666;
            margin-top: 10px;
        }
        .form-control {
            border-radius: 10px;
            padding: 12px 15px;
            border: 2px solid #e1e5e9;
        }
        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
        }
        .btn-login {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 10px;
            padding: 12px;
            font-weight: bold;
            color: white;
            width: 100%;
            transition: transform 0.2s;
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        .role-badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 5px;
            font-size: 0.8em;
            margin-left: 5px;
        }
        .alert {
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-header">
            <h2>🏥 校医院管理系统</h2>
            <p>医务收费管理平台</p>
        </div>
        
        <div id="alert-container"></div>
        
        <form id="loginForm">
            <div class="mb-3">
                <label for="username" class="form-label">用户名</label>
                <input type="text" class="form-control" id="username" name="username" required>
            </div>
            
            <div class="mb-3">
                <label for="password" class="form-label">密码</label>
                <input type="password" class="form-control" id="password" name="password" required>
            </div>
            
            <button type="submit" class="btn btn-login" id="loginBtn">
                <span class="spinner-border spinner-border-sm d-none" role="status" aria-hidden="true"></span>
                登录
            </button>
        </form>
        
        <div class="mt-4">
            <h6 class="text-muted">测试账号：</h6>
            <div class="d-flex flex-wrap gap-1 mt-2">
                <span class="badge bg-primary" onclick="fillLogin('admin', '123456')">管理员</span>
                <span class="badge bg-success" onclick="fillLogin('guahao01', '123456')">挂号员</span>
                <span class="badge bg-info" onclick="fillLogin('zhangsan', '123456')">医生</span>
                <span class="badge bg-warning" onclick="fillLogin('shoufei01', '123456')">收费员</span>
                <span class="badge bg-secondary" onclick="fillLogin('yaofang01', '123456')">药房</span>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        // 自动填充登录信息
        function fillLogin(username, password) {
            $('#username').val(username);
            $('#password').val(password);
        }
        
        // 显示提示信息
        function showAlert(message, type = 'danger') {
            const alertHtml = `
                <div class="alert alert-${type} alert-dismissible fade show" role="alert">
                    ${message}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            `;
            $('#alert-container').html(alertHtml);
        }
        
        // 登录表单提交
        $('#loginForm').on('submit', function(e) {
            e.preventDefault();
            
            const username = $('#username').val().trim();
            const password = $('#password').val().trim();
            
            if (!username || !password) {
                showAlert('请输入用户名和密码！');
                return;
            }
            
            // 显示加载状态
            const $btn = $('#loginBtn');
            const $spinner = $btn.find('.spinner-border');
            $btn.prop('disabled', true);
            $spinner.removeClass('d-none');
            
            // 发送登录请求
            $.ajax({
                url: '/api/login',
                method: 'POST',
                contentType: 'application/json',
                data: JSON.stringify({
                    username: username,
                    password: password
                }),
                success: function(response) {
                    if (response.success) {
                        showAlert('登录成功，正在跳转...', 'success');
                        setTimeout(() => {
                            window.location.href = '/index.html';
                        }, 1000);
                    } else {
                        showAlert(response.message || '登录失败');
                    }
                },
                error: function(xhr) {
                    let message = '登录失败，请稍后重试';
                    if (xhr.responseJSON && xhr.responseJSON.message) {
                        message = xhr.responseJSON.message;
                    }
                    showAlert(message);
                },
                complete: function() {
                    // 恢复按钮状态
                    $btn.prop('disabled', false);
                    $spinner.addClass('d-none');
                }
            });
        });
        
        // 页面加载时检查是否已登录
        $(document).ready(function() {
            $.ajax({
                url: '/api/current_user',
                method: 'GET',
                success: function(response) {
                    if (response.success) {
                        // 已登录，直接跳转到主页
                        window.location.href = '/index.html';
                    }
                },
                error: function() {
                    // 未登录，继续显示登录页面
                }
            });
        });
    </script>
</body>
</html>
