<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>缴费结算 - 校医院医务收费管理系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        .page-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 0;
            margin-bottom: 30px;
        }
        .content-card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }
        .prescription-card {
            border: 2px solid #e1e5e9;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 15px;
            transition: all 0.3s;
        }
        .prescription-card:hover {
            border-color: #667eea;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .payment-summary {
            background: linear-gradient(135deg, #56ab2f 0%, #a8e6cf 100%);
            color: white;
            padding: 25px;
            border-radius: 15px;
            margin: 20px 0;
        }
        .payment-summary h3 {
            margin: 0;
            font-weight: bold;
        }
        .drug-list {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 15px;
            margin: 15px 0;
        }
        .drug-item {
            display: flex;
            justify-content: between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid #e9ecef;
        }
        .drug-item:last-child {
            border-bottom: none;
        }
        .btn-custom {
            border-radius: 10px;
            padding: 12px 24px;
            font-weight: bold;
        }
        .search-box {
            border-radius: 10px;
            padding: 12px 15px;
            border: 2px solid #e1e5e9;
        }
        .search-box:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
        }
        .status-badge {
            font-size: 0.9em;
            padding: 5px 10px;
        }
    </style>
</head>
<body>
    <!-- 页面头部 -->
    <div class="page-header">
        <div class="container">
            <div class="row align-items-center">
                <div class="col">
                    <h1><i class="bi bi-credit-card"></i> 缴费结算</h1>
                    <p class="mb-0">处理患者缴费业务</p>
                </div>
                <div class="col-auto">
                    <a href="index.html" class="btn btn-light">
                        <i class="bi bi-house"></i> 返回主页
                    </a>
                </div>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="row">
            <!-- 左侧：处方查询 -->
            <div class="col-md-5">
                <div class="content-card">
                    <h4 class="mb-4"><i class="bi bi-search"></i> 处方查询</h4>
                    
                    <div class="mb-3">
                        <label class="form-label">处方编号</label>
                        <div class="input-group">
                            <input type="number" class="form-control search-box" id="prescriptionId" placeholder="输入处方编号">
                            <button class="btn btn-primary" type="button" onclick="searchPrescription()">
                                <i class="bi bi-search"></i> 查询
                            </button>
                        </div>
                    </div>
                    
                    <div class="mb-4">
                        <label class="form-label">快速选择待缴费处方</label>
                        <div id="pendingPrescriptions">
                            <div class="text-center text-muted">
                                <div class="spinner-border" role="status"></div>
                                <p class="mt-2">加载中...</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- 右侧：处方详情和缴费 -->
            <div class="col-md-7">
                <div class="content-card">
                    <h4 class="mb-4"><i class="bi bi-receipt"></i> 处方详情</h4>
                    
                    <div id="alertContainer"></div>
                    
                    <div id="prescriptionDetails" style="display: none;">
                        <!-- 处方基本信息 -->
                        <div class="alert alert-info">
                            <div class="row">
                                <div class="col-md-6">
                                    <strong>患者：</strong><span id="patientName"></span><br>
                                    <strong>医生：</strong><span id="doctorName"></span>
                                </div>
                                <div class="col-md-6">
                                    <strong>科室：</strong><span id="departmentName"></span><br>
                                    <strong>开方时间：</strong><span id="prescriptionTime"></span>
                                </div>
                            </div>
                        </div>
                        
                        <!-- 费用明细 -->
                        <div class="mb-3">
                            <h6>费用明细</h6>
                            <div class="table-responsive">
                                <table class="table table-sm">
                                    <thead class="table-light">
                                        <tr>
                                            <th>项目</th>
                                            <th>金额</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <tr>
                                            <td>挂号费</td>
                                            <td>¥<span id="registrationFee">0.00</span></td>
                                        </tr>
                                        <tr>
                                            <td>药品费</td>
                                            <td>¥<span id="drugFee">0.00</span></td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                        
                        <!-- 药品清单 -->
                        <div class="mb-3">
                            <h6>药品清单</h6>
                            <div id="drugList" class="drug-list">
                                <!-- 药品项将通过JavaScript生成 -->
                            </div>
                        </div>
                        
                        <!-- 缴费汇总 -->
                        <div class="payment-summary text-center">
                            <h3>总计金额：¥<span id="totalAmount">0.00</span></h3>
                            <p class="mb-0">包含挂号费和药品费</p>
                        </div>
                        
                        <!-- 缴费按钮 -->
                        <div class="d-grid">
                            <button type="button" class="btn btn-success btn-lg btn-custom" id="payButton">
                                <span class="spinner-border spinner-border-sm d-none" role="status"></span>
                                <i class="bi bi-credit-card-2-front"></i> 确认缴费
                            </button>
                        </div>
                    </div>
                    
                    <div id="noPrescriptionSelected" class="text-center text-muted py-5">
                        <i class="bi bi-receipt-cutoff" style="font-size: 3rem; opacity: 0.3;"></i>
                        <p class="mt-3">请先查询或选择处方</p>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 最近缴费记录 -->
        <div class="content-card">
            <h4 class="mb-4"><i class="bi bi-clock-history"></i> 最近缴费记录</h4>
            <div class="table-responsive">
                <table class="table table-hover">
                    <thead class="table-light">
                        <tr>
                            <th>处方号</th>
                            <th>患者姓名</th>
                            <th>医生</th>
                            <th>总金额</th>
                            <th>缴费时间</th>
                            <th>状态</th>
                        </tr>
                    </thead>
                    <tbody id="recentPayments">
                        <tr>
                            <td colspan="6" class="text-center text-muted">暂无数据</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        let currentPrescription = null;
        
        // 显示提示信息
        function showAlert(message, type = 'danger') {
            const alertHtml = `
                <div class="alert alert-${type} alert-dismissible fade show" role="alert">
                    ${message}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            `;
            $('#alertContainer').html(alertHtml);
            
            setTimeout(() => {
                $('.alert').alert('close');
            }, 5000);
        }
        
        // 检查权限
        function checkPermission() {
            $.ajax({
                url: '/api/current_user',
                method: 'GET',
                success: function(response) {
                    if (!response.success || response.user.role !== 'cashier') {
                        alert('您没有权限访问此页面');
                        window.location.href = '/index.html';
                    }
                },
                error: function() {
                    window.location.href = '/login.html';
                }
            });
        }
        
        // 加载待缴费处方列表
        function loadPendingPrescriptions() {
            // 使用模拟数据，实际应该从API获取
            const mockPrescriptions = [
                {
                    id: 6,
                    patient_name: '陈伟',
                    doctor_name: '张三',
                    total_amount: 52.0,
                    created_at: new Date().toISOString()
                },
                {
                    id: 7,
                    patient_name: '孙敏',
                    doctor_name: '王五',
                    total_amount: 25.0,
                    created_at: new Date().toISOString()
                },
                {
                    id: 8,
                    patient_name: '周杰',
                    doctor_name: '李四',
                    total_amount: 35.0,
                    created_at: new Date().toISOString()
                }
            ];
            
            if (mockPrescriptions.length === 0) {
                $('#pendingPrescriptions').html('<div class="text-muted">暂无待缴费处方</div>');
                return;
            }
            
            let html = '';
            mockPrescriptions.forEach(prescription => {
                html += `
                    <div class="prescription-card" style="cursor: pointer;" onclick="loadPrescriptionDetails(${prescription.id})">
                        <div class="row align-items-center">
                            <div class="col">
                                <h6 class="mb-1">处方 #${prescription.id}</h6>
                                <small class="text-muted">患者：${prescription.patient_name}</small><br>
                                <small class="text-muted">医生：${prescription.doctor_name}</small>
                            </div>
                            <div class="col-auto">
                                <h5 class="mb-0 text-primary">¥${prescription.total_amount.toFixed(2)}</h5>
                                <span class="badge bg-warning status-badge">待缴费</span>
                            </div>
                        </div>
                    </div>
                `;
            });
            
            $('#pendingPrescriptions').html(html);
        }
        
        // 搜索处方
        function searchPrescription() {
            const prescriptionId = $('#prescriptionId').val().trim();
            if (!prescriptionId) {
                showAlert('请输入处方编号');
                return;
            }
            
            loadPrescriptionDetails(parseInt(prescriptionId));
        }
        
        // 加载处方详情
        function loadPrescriptionDetails(prescriptionId) {
            $.ajax({
                url: `/api/prescriptions/${prescriptionId}`,
                method: 'GET',
                success: function(response) {
                    if (response.success) {
                        currentPrescription = response.data;
                        displayPrescriptionDetails(response.data);
                    } else {
                        showAlert(response.message || '处方不存在');
                        clearPrescriptionDetails();
                    }
                },
                error: function(xhr) {
                    let message = '查询失败，请稍后重试';
                    if (xhr.responseJSON && xhr.responseJSON.message) {
                        message = xhr.responseJSON.message;
                    }
                    showAlert(message);
                    clearPrescriptionDetails();
                }
            });
        }
        
        // 显示处方详情
        function displayPrescriptionDetails(prescription) {
            $('#noPrescriptionSelected').hide();
            $('#prescriptionDetails').show();
            
            // 填充基本信息
            $('#patientName').text(prescription.patient_name);
            $('#doctorName').text(prescription.doctor_name);
            $('#departmentName').text(prescription.department_name);
            $('#prescriptionTime').text(new Date(prescription.created_at).toLocaleString());
            
            // 填充费用信息
            $('#registrationFee').text(prescription.registration_fee.toFixed(2));
            $('#drugFee').text(prescription.total_amount.toFixed(2));
            
            const totalAmount = prescription.registration_fee + prescription.total_amount;
            $('#totalAmount').text(totalAmount.toFixed(2));
            
            // 显示药品清单
            let drugListHtml = '';
            prescription.details.forEach(detail => {
                drugListHtml += `
                    <div class="drug-item">
                        <div class="row align-items-center">
                            <div class="col">
                                <strong>${detail.drug_name}</strong>
                            </div>
                            <div class="col-auto">
                                ${detail.quantity} × ¥${detail.sale_price.toFixed(2)}
                            </div>
                            <div class="col-auto">
                                <strong>¥${detail.subtotal.toFixed(2)}</strong>
                            </div>
                        </div>
                    </div>
                `;
            });
            
            $('#drugList').html(drugListHtml);
            
            // 设置缴费按钮状态
            if (prescription.status === 'paid') {
                $('#payButton').prop('disabled', true).html('<i class="bi bi-check-circle"></i> 已缴费');
            } else {
                $('#payButton').prop('disabled', false).html('<i class="bi bi-credit-card-2-front"></i> 确认缴费');
            }
        }
        
        // 清空处方详情
        function clearPrescriptionDetails() {
            currentPrescription = null;
            $('#prescriptionDetails').hide();
            $('#noPrescriptionSelected').show();
        }
        
        // 处理缴费
        $('#payButton').on('click', function() {
            if (!currentPrescription) {
                showAlert('请先选择处方');
                return;
            }
            
            if (currentPrescription.status === 'paid') {
                showAlert('该处方已缴费', 'warning');
                return;
            }
            
            const $btn = $(this);
            const $spinner = $btn.find('.spinner-border');
            $btn.prop('disabled', true);
            $spinner.removeClass('d-none');
            
            $.ajax({
                url: `/api/prescriptions/${currentPrescription.id}/pay`,
                method: 'POST',
                success: function(response) {
                    if (response.success) {
                        showAlert('缴费成功！', 'success');
                        
                        // 更新处方状态
                        currentPrescription.status = 'paid';
                        $btn.html('<i class="bi bi-check-circle"></i> 已缴费');
                        
                        // 重新加载待缴费列表
                        loadPendingPrescriptions();
                        loadRecentPayments();
                        
                        // 清空搜索框
                        $('#prescriptionId').val('');
                    } else {
                        showAlert(response.message || '缴费失败');
                        $btn.prop('disabled', false);
                    }
                },
                error: function(xhr) {
                    let message = '缴费失败，请稍后重试';
                    if (xhr.responseJSON && xhr.responseJSON.message) {
                        message = xhr.responseJSON.message;
                    }
                    showAlert(message);
                    $btn.prop('disabled', false);
                },
                complete: function() {
                    $spinner.addClass('d-none');
                }
            });
        });
        
        // 回车键搜索
        $('#prescriptionId').on('keypress', function(e) {
            if (e.which === 13) {
                searchPrescription();
            }
        });
        
        // 加载最近缴费记录
        function loadRecentPayments() {
            // 使用模拟数据
            const mockPayments = [
                {
                    id: 1,
                    patient_name: '张明',
                    doctor_name: '张三',
                    total_amount: 60.5,
                    paid_time: new Date().toLocaleString(),
                    status: 'paid'
                },
                {
                    id: 2,
                    patient_name: '李华',
                    doctor_name: '李四',
                    total_amount: 48.0,
                    paid_time: new Date().toLocaleString(),
                    status: 'paid'
                }
            ];
            
            if (mockPayments.length === 0) {
                $('#recentPayments').html('<tr><td colspan="6" class="text-center text-muted">暂无数据</td></tr>');
                return;
            }
            
            let html = '';
            mockPayments.forEach(payment => {
                html += `
                    <tr>
                        <td>#${payment.id}</td>
                        <td>${payment.patient_name}</td>
                        <td>${payment.doctor_name}</td>
                        <td>¥${payment.total_amount.toFixed(2)}</td>
                        <td>${payment.paid_time}</td>
                        <td><span class="badge bg-success">已缴费</span></td>
                    </tr>
                `;
            });
            
            $('#recentPayments').html(html);
        }
        
        // 页面初始化
        $(document).ready(function() {
            checkPermission();
            loadPendingPrescriptions();
            loadRecentPayments();
        });
    </script>
</body>
</html>
