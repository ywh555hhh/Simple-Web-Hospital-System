<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>科室管理 - 校医院医务收费管理系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        .page-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 0;
            margin-bottom: 30px;
        }
        .content-card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }
        .dept-card {
            border: 2px solid #e1e5e9;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            transition: all 0.3s;
        }
        .dept-card:hover {
            border-color: #667eea;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .btn-custom {
            border-radius: 10px;
            padding: 8px 16px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <!-- 页面头部 -->
    <div class="page-header">
        <div class="container">
            <div class="row align-items-center">
                <div class="col">
                    <h1><i class="bi bi-building"></i> 科室管理</h1>
                    <p class="mb-0">管理医院科室信息</p>
                </div>
                <div class="col-auto">
                    <a href="index.html" class="btn btn-light">
                        <i class="bi bi-house"></i> 返回主页
                    </a>
                </div>
            </div>
        </div>
    </div>

    <div class="container">
        <!-- 新增科室 -->
        <div class="content-card">
            <h4 class="mb-4"><i class="bi bi-plus-circle"></i> 新增科室</h4>
            
            <div id="alertContainer"></div>
            
            <form id="addDeptForm" class="row g-3 align-items-end">
                <div class="col-md-8">
                    <label for="deptName" class="form-label">科室名称</label>
                    <input type="text" class="form-control" id="deptName" placeholder="请输入科室名称" required>
                </div>
                <div class="col-md-4">
                    <button type="submit" class="btn btn-primary btn-custom w-100" id="addDeptBtn">
                        <span class="spinner-border spinner-border-sm d-none" role="status"></span>
                        <i class="bi bi-plus"></i> 添加科室
                    </button>
                </div>
            </form>
        </div>

        <!-- 科室列表 -->
        <div class="content-card">
            <h4 class="mb-4"><i class="bi bi-list-ul"></i> 科室列表</h4>
            
            <div id="departmentsContainer">
                <div class="text-center">
                    <div class="spinner-border" role="status"></div>
                    <p class="mt-2 text-muted">加载中...</p>
                </div>
            </div>
        </div>
    </div>

    <!-- 删除确认模态框 -->
    <div class="modal fade" id="deleteModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">确认删除</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="alert alert-warning">
                        <i class="bi bi-exclamation-triangle"></i>
                        确定要删除科室 "<span id="deleteDeptName"></span>" 吗？
                    </div>
                    <p class="text-muted">删除后不可恢复，请谨慎操作。</p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-danger" id="confirmDeleteBtn">
                        <span class="spinner-border spinner-border-sm d-none" role="status"></span>
                        确认删除
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        let currentDepartments = [];
        let deletingDeptId = null;
        
        // 显示提示信息
        function showAlert(message, type = 'danger') {
            const alertHtml = `
                <div class="alert alert-${type} alert-dismissible fade show" role="alert">
                    ${message}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            `;
            $('#alertContainer').html(alertHtml);
            
            // 自动滚动到顶部
            $('html, body').animate({scrollTop: 0}, 500);
            
            setTimeout(() => {
                $('.alert').alert('close');
            }, 5000);
        }
        
        // 检查权限
        function checkPermission() {
            $.ajax({
                url: '/api/current_user',
                method: 'GET',
                success: function(response) {
                    if (!response.success || response.user.role !== 'admin') {
                        alert('您没有权限访问此页面');
                        window.location.href = '/index.html';
                    }
                },
                error: function() {
                    window.location.href = '/login.html';
                }
            });
        }
        
        // 加载科室列表
        function loadDepartments() {
            $.ajax({
                url: '/api/departments',
                method: 'GET',
                success: function(response) {
                    if (response.success) {
                        currentDepartments = response.data;
                        displayDepartments(currentDepartments);
                    } else {
                        $('#departmentsContainer').html('<div class="text-danger">加载科室列表失败</div>');
                    }
                },
                error: function() {
                    $('#departmentsContainer').html('<div class="text-danger">加载科室列表失败</div>');
                }
            });
        }
        
        // 显示科室列表
        function displayDepartments(departments) {
            if (departments.length === 0) {
                $('#departmentsContainer').html(`
                    <div class="text-center text-muted py-5">
                        <i class="bi bi-building" style="font-size: 3rem; opacity: 0.3;"></i>
                        <p class="mt-3">暂无科室数据</p>
                    </div>
                `);
                return;
            }
            
            let html = '';
            departments.forEach(dept => {
                html += `
                    <div class="dept-card">
                        <div class="row align-items-center">
                            <div class="col">
                                <h5 class="mb-1">
                                    <i class="bi bi-hospital text-primary"></i>
                                    ${dept.name}
                                </h5>
                                <small class="text-muted">科室ID: ${dept.id}</small>
                            </div>
                            <div class="col-auto">
                                <button type="button" class="btn btn-sm btn-outline-danger btn-custom" 
                                        onclick="showDeleteModal(${dept.id}, '${dept.name}')">
                                    <i class="bi bi-trash"></i> 删除
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            });
            
            $('#departmentsContainer').html(html);
        }
        
        // 添加科室表单提交
        $('#addDeptForm').on('submit', function(e) {
            e.preventDefault();
            
            const deptName = $('#deptName').val().trim();
            if (!deptName) {
                showAlert('请输入科室名称');
                return;
            }
            
            const $btn = $('#addDeptBtn');
            const $spinner = $btn.find('.spinner-border');
            $btn.prop('disabled', true);
            $spinner.removeClass('d-none');
            
            $.ajax({
                url: '/api/departments',
                method: 'POST',
                contentType: 'application/json',
                data: JSON.stringify({ name: deptName }),
                success: function(response) {
                    if (response.success) {
                        showAlert('科室添加成功！', 'success');
                        $('#deptName').val('');
                        loadDepartments();
                    } else {
                        showAlert(response.message || '添加科室失败');
                    }
                },
                error: function(xhr) {
                    let message = '添加科室失败，请稍后重试';
                    if (xhr.responseJSON && xhr.responseJSON.message) {
                        message = xhr.responseJSON.message;
                    }
                    showAlert(message);
                },
                complete: function() {
                    $btn.prop('disabled', false);
                    $spinner.addClass('d-none');
                }
            });
        });
        
        // 显示删除确认模态框
        function showDeleteModal(deptId, deptName) {
            deletingDeptId = deptId;
            $('#deleteDeptName').text(deptName);
            $('#deleteModal').modal('show');
        }
        
        // 确认删除科室
        $('#confirmDeleteBtn').on('click', function() {
            if (!deletingDeptId) return;
            
            const $btn = $(this);
            const $spinner = $btn.find('.spinner-border');
            $btn.prop('disabled', true);
            $spinner.removeClass('d-none');
            
            $.ajax({
                url: `/api/departments/${deletingDeptId}`,
                method: 'DELETE',
                success: function(response) {
                    if (response.success) {
                        showAlert('科室删除成功！', 'success');
                        $('#deleteModal').modal('hide');
                        loadDepartments();
                    } else {
                        showAlert(response.message || '删除科室失败');
                    }
                },
                error: function(xhr) {
                    let message = '删除科室失败，请稍后重试';
                    if (xhr.responseJSON && xhr.responseJSON.message) {
                        message = xhr.responseJSON.message;
                    }
                    showAlert(message);
                },
                complete: function() {
                    $btn.prop('disabled', false);
                    $spinner.addClass('d-none');
                }
            });
        });
        
        // 模态框关闭时重置状态
        $('#deleteModal').on('hidden.bs.modal', function() {
            deletingDeptId = null;
        });
        
        // 页面初始化
        $(document).ready(function() {
            checkPermission();
            loadDepartments();
        });
    </script>
</body>
</html>
