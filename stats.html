<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>统计查询 - 校医院医务收费管理系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        .page-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 0;
            margin-bottom: 30px;
        }
        .content-card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }
        .stats-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: center;
        }
        .stats-card h3 {
            font-size: 2.5rem;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .stats-card p {
            margin: 0;
            opacity: 0.9;
        }
        .stock-status {
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.8em;
            font-weight: bold;
        }
        .stock-low { background: #ffebee; color: #d32f2f; }
        .stock-normal { background: #fff3e0; color: #f57c00; }
        .stock-high { background: #e8f5e8; color: #388e3c; }
        .bg-gradient-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%) !important; }
        .bg-gradient-success { background: linear-gradient(135deg, #56ab2f 0%, #a8e6cf 100%) !important; }
        .bg-gradient-info { background: linear-gradient(135deg, #74b9ff 0%, #0984e3 100%) !important; }
        .bg-gradient-warning { background: linear-gradient(135deg, #fdcb6e 0%, #e17055 100%) !important; }
    </style>
</head>
<body>
    <!-- 页面头部 -->
    <div class="page-header">
        <div class="container">
            <div class="row align-items-center">
                <div class="col">
                    <h1><i class="bi bi-graph-up"></i> 统计查询</h1>
                    <p class="mb-0">查看系统统计报表</p>
                </div>
                <div class="col-auto">
                    <a href="index.html" class="btn btn-light">
                        <i class="bi bi-house"></i> 返回主页
                    </a>
                </div>
            </div>
        </div>
    </div>

    <div class="container">
        <!-- 今日统计 -->
        <div class="content-card">
            <h4 class="mb-4"><i class="bi bi-calendar-day"></i> 今日统计</h4>
            
            <div class="row" id="todayStatsContainer">
                <div class="col-md-3">
                    <div class="stats-card bg-gradient-primary">
                        <div class="spinner-border" role="status"></div>
                        <p class="mt-2">加载中...</p>
                    </div>
                </div>
            </div>
            
            <div class="row">
                <div class="col-md-6">
                    <div class="alert alert-info">
                        <h6><i class="bi bi-info-circle"></i> 收入构成</h6>
                        <div class="row">
                            <div class="col-6">
                                <strong>挂号费收入：</strong><br>
                                ¥<span id="registrationIncome">0.00</span>
                            </div>
                            <div class="col-6">
                                <strong>药品费收入：</strong><br>
                                ¥<span id="drugIncome">0.00</span>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="alert alert-warning">
                        <h6><i class="bi bi-exclamation-triangle"></i> 业务提醒</h6>
                        <div id="businessAlerts">
                            <div class="spinner-border spinner-border-sm" role="status"></div>
                            加载中...
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 药品库存统计 -->
        <div class="content-card" id="drugInventorySection" style="display: none;">
            <h4 class="mb-4"><i class="bi bi-capsule"></i> 药品库存统计</h4>
            
            <div class="row mb-3">
                <div class="col-md-4">
                    <div class="card border-danger">
                        <div class="card-body text-center">
                            <h5 class="card-title text-danger">库存告急</h5>
                            <h3 class="text-danger" id="lowStockCount">0</h3>
                            <small class="text-muted">种药品</small>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card border-warning">
                        <div class="card-body text-center">
                            <h5 class="card-title text-warning">库存正常</h5>
                            <h3 class="text-warning" id="normalStockCount">0</h3>
                            <small class="text-muted">种药品</small>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card border-success">
                        <div class="card-body text-center">
                            <h5 class="card-title text-success">库存充足</h5>
                            <h3 class="text-success" id="highStockCount">0</h3>
                            <small class="text-muted">种药品</small>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="table-responsive">
                <table class="table table-hover">
                    <thead class="table-light">
                        <tr>
                            <th>药品名称</th>
                            <th>当前库存</th>
                            <th>库存阈值</th>
                            <th>库存状态</th>
                        </tr>
                    </thead>
                    <tbody id="drugInventoryTableBody">
                        <tr>
                            <td colspan="4" class="text-center">
                                <div class="spinner-border" role="status"></div>
                                <p class="mt-2 text-muted">加载中...</p>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- 业务流程统计 -->
        <div class="content-card">
            <h4 class="mb-4"><i class="bi bi-flow-chart"></i> 业务流程统计</h4>
            
            <div class="row">
                <div class="col-md-6">
                    <h6>挂号状态分布</h6>
                    <div class="progress mb-3" style="height: 25px;">
                        <div class="progress-bar bg-warning" role="progressbar" style="width: 30%" id="waitingProgress">
                            <span>待就诊 30%</span>
                        </div>
                        <div class="progress-bar bg-info" role="progressbar" style="width: 40%" id="finishedProgress">
                            <span>已就诊 40%</span>
                        </div>
                        <div class="progress-bar bg-success" role="progressbar" style="width: 30%" id="paidProgress">
                            <span>已缴费 30%</span>
                        </div>
                    </div>
                </div>
                <div class="col-md-6">
                    <h6>处方状态分布</h6>
                    <div class="progress mb-3" style="height: 25px;">
                        <div class="progress-bar bg-warning" role="progressbar" style="width: 60%" id="pendingPaymentProgress">
                            <span>待缴费 60%</span>
                        </div>
                        <div class="progress-bar bg-success" role="progressbar" style="width: 40%" id="prescriptionPaidProgress">
                            <span>已缴费 40%</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 系统使用统计 -->
        <div class="content-card">
            <h4 class="mb-4"><i class="bi bi-people"></i> 系统使用统计</h4>
            
            <div class="row">
                <div class="col-md-3">
                    <div class="text-center">
                        <i class="bi bi-person-gear text-primary" style="font-size: 2rem;"></i>
                        <h5 class="mt-2">管理员</h5>
                        <p class="text-muted">1 人</p>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="text-center">
                        <i class="bi bi-person-plus text-success" style="font-size: 2rem;"></i>
                        <h5 class="mt-2">挂号员</h5>
                        <p class="text-muted">1 人</p>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="text-center">
                        <i class="bi bi-person-heart text-info" style="font-size: 2rem;"></i>
                        <h5 class="mt-2">医生</h5>
                        <p class="text-muted">3 人</p>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="text-center">
                        <i class="bi bi-credit-card text-warning" style="font-size: 2rem;"></i>
                        <h5 class="mt-2">收费员</h5>
                        <p class="text-muted">1 人</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        let currentUser = null;
        
        // 检查权限并获取用户信息
        function checkPermission() {
            $.ajax({
                url: '/api/current_user',
                method: 'GET',
                success: function(response) {
                    if (response.success) {
                        currentUser = response.user;
                        initializePage();
                    } else {
                        window.location.href = '/login.html';
                    }
                },
                error: function() {
                    window.location.href = '/login.html';
                }
            });
        }
        
        // 初始化页面
        function initializePage() {
            loadTodayStats();
            
            // 只有药房管理员和管理员可以查看药品库存统计
            if (['pharmacy', 'admin'].includes(currentUser.role)) {
                $('#drugInventorySection').show();
                loadDrugInventoryStats();
            }
        }
        
        // 加载今日统计
        function loadTodayStats() {
            $.ajax({
                url: '/api/stats/today',
                method: 'GET',
                success: function(response) {
                    if (response.success) {
                        displayTodayStats(response.data);
                    } else {
                        $('#todayStatsContainer').html('<div class="text-danger">加载统计数据失败</div>');
                    }
                },
                error: function() {
                    $('#todayStatsContainer').html('<div class="text-danger">加载统计数据失败</div>');
                }
            });
        }
        
        // 显示今日统计
        function displayTodayStats(stats) {
            const statsHtml = `
                <div class="col-md-3">
                    <div class="stats-card bg-gradient-primary">
                        <h3>${stats.today_registrations}</h3>
                        <p>今日挂号</p>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="stats-card bg-gradient-success">
                        <h3>¥${stats.total_income.toFixed(2)}</h3>
                        <p>今日收入</p>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="stats-card bg-gradient-info">
                        <h3>${stats.pending_prescriptions}</h3>
                        <p>待缴费处方</p>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="stats-card bg-gradient-warning">
                        <h3>${stats.low_stock_drugs}</h3>
                        <p>库存告急药品</p>
                    </div>
                </div>
            `;
            $('#todayStatsContainer').html(statsHtml);
            
            // 更新收入明细
            $('#registrationIncome').text(stats.registration_income.toFixed(2));
            $('#drugIncome').text(stats.drug_income.toFixed(2));
            
            // 更新业务提醒
            let alerts = [];
            if (stats.pending_prescriptions > 5) {
                alerts.push(`• ${stats.pending_prescriptions} 张处方待缴费`);
            }
            if (stats.low_stock_drugs > 0) {
                alerts.push(`• ${stats.low_stock_drugs} 种药品库存告急`);
            }
            if (stats.today_registrations === 0) {
                alerts.push('• 今日暂无挂号记录');
            }
            
            $('#businessAlerts').html(alerts.length > 0 ? alerts.join('<br>') : '• 一切正常');
        }
        
        // 加载药品库存统计
        function loadDrugInventoryStats() {
            $.ajax({
                url: '/api/stats/drug_inventory',
                method: 'GET',
                success: function(response) {
                    if (response.success) {
                        displayDrugInventoryStats(response.data);
                    } else {
                        $('#drugInventoryTableBody').html('<tr><td colspan="4" class="text-center text-danger">加载失败</td></tr>');
                    }
                },
                error: function() {
                    $('#drugInventoryTableBody').html('<tr><td colspan="4" class="text-center text-danger">加载失败</td></tr>');
                }
            });
        }
        
        // 显示药品库存统计
        function displayDrugInventoryStats(drugs) {
            let lowStockCount = 0;
            let normalStockCount = 0;
            let highStockCount = 0;
            
            // 统计各状态药品数量
            drugs.forEach(drug => {
                switch(drug.status) {
                    case 'low': lowStockCount++; break;
                    case 'normal': normalStockCount++; break;
                    case 'high': highStockCount++; break;
                }
            });
            
            // 更新统计卡片
            $('#lowStockCount').text(lowStockCount);
            $('#normalStockCount').text(normalStockCount);
            $('#highStockCount').text(highStockCount);
            
            // 显示药品列表
            if (drugs.length === 0) {
                $('#drugInventoryTableBody').html('<tr><td colspan="4" class="text-center text-muted">暂无药品数据</td></tr>');
                return;
            }
            
            let html = '';
            drugs.forEach(drug => {
                const statusText = drug.status === 'low' ? '库存告急' : 
                                 drug.status === 'normal' ? '库存正常' : '库存充足';
                const statusClass = `stock-${drug.status}`;
                
                html += `
                    <tr>
                        <td><strong>${drug.name}</strong></td>
                        <td>${drug.stock} 个单位</td>
                        <td>${drug.min_threshold} - ${drug.max_threshold}</td>
                        <td><span class="stock-status ${statusClass}">${statusText}</span></td>
                    </tr>
                `;
            });
            
            $('#drugInventoryTableBody').html(html);
        }
        
        // 页面初始化
        $(document).ready(function() {
            checkPermission();
        });
    </script>
</body>
</html>
